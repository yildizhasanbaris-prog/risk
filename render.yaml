# Render.com - Railway alternatifi (ücretsiz tier)
# https://render.com -> New -> Web Service -> Connect repo
services:
  - type: web
    name: risk-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
