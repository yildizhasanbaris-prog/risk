services:
  postgres:
    image: postgres:16-alpine
    container_name: risk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risk_db
    ports:
      - "5432:5432"
    volumes:
      - risk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  risk_pgdata:
